name: Monitor citas jura

on:
  workflow_dispatch:

  schedule:
    - cron: "0,30 * * * *"

permissions:
  contents: write

concurrency:
  group: monitor-citas
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Espera aleatoria
        run: |
          python - <<'PY'
          import random
          import time

          espera = random.randint(0, 1200)
          print(f"Esperando {espera} segundos antes de consultar...")
          time.sleep(espera)
          PY

      - name: Ejecutar monitor
        env:
          NIE: ${{ secrets.NIE }}
          NOMBRE_COMPLETO: ${{ secrets.NOMBRE_COMPLETO }}
          EMAIL_ORIGEN: ${{ secrets.EMAIL_ORIGEN }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python monitor_citas.py

      - name: Subir log, historial y capturas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-monitor-citas-${{ github.run_number }}
          path: |
            monitor_citas.log
            historial_consultas.csv
            capturas/
          if-no-files-found: ignore
          retention-days: 30

      - name: Guardar historial acumulado
        if: always()
        run: |
          if [ ! -f historial_consultas.csv ]; then
            echo "No existe historial_consultas.csv; no hay nada que guardar."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add historial_consultas.csv

          if git diff --cached --quiet; then
            echo "No hay cambios en el historial."
            exit 0
          fi

          git commit -m "Actualizar historial de consultas"

          for intento in 1 2 3; do
            if git push; then
              exit 0
            fi

            echo "Push fallido. Reintentando: $intento/3"
            git pull --rebase origin main
            sleep 5
          done

          echo "No fue posible guardar el historial tras 3 intentos."
          exit 1
