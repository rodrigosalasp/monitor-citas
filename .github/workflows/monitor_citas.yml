name: Monitor citas jura

on:
  workflow_dispatch:

  schedule:
    - cron: "0 * * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Espera aleatoria
        run: |
          python - <<'PY'
          import random
          import time

          espera = random.randint(0, 1200)
          print(f"Esperando {espera} segundos antes de consultar...")
          time.sleep(espera)
          PY

      - name: Ejecutar monitor
        env:
          NIE: ${{ secrets.NIE }}
          NOMBRE_COMPLETO: ${{ secrets.NOMBRE_COMPLETO }}
          EMAIL_ORIGEN: ${{ secrets.EMAIL_ORIGEN }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python monitor_citas.py

      - name: Subir logs y capturas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-monitor-citas
          path: |
            monitor_citas.log
            capturas/
          if-no-files-found: ignore
